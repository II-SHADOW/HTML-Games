<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home - Classroom</title>
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAABsklEQVQYV6WPMY9MYRSGnzO5K5mrsczINCujkBh3ihU1CX9BMSsKtqTQ6mzDr5BFQiLRSkRoFRu7icIQ3YoCESHL3DEbmfMqzjc3d1BxmvPlS97nPK9J4n8mm75Yvsz00zkzYTYPkwypAbJ4e2xkyBuw0LpvPzfaMpURrgMUAIhgBZGBGgGznIzpGMx4OW7xatLGbBYGJJTecoHHu2h+pZ/vgP8gQ4YQw3GbB1+OQgIgkS80kYvR7igBHLkzaImi+Q1kZKEJuJB71WDvnpy1M1dBsPb0BqNJiWpGqSWN6GRJ05ELubiwvEJ33xLdxSVWT5xHVRclw8ilCoY89STwt7fu0V08BMD687thKM1biKhgM3CtwmhScu3xdSRR7pZVuPInDicDknoA+p0eRecY/U4PgOGH12y83WT783aAHDSrIBlAquBcOXmJ00dOUZ+i02Nw/CwPh4+4+exWfMqQjExuYIDC4vdwfQ7v786FEWSoAYiiucPgwDuGb9bnQlVloCw/stJ+T5F/j4MyrHxyUKCw+NsIIK4pbbAAy8gkWwUu2uzSDKT6+jMIINkdU93xH+YXTrImgXmBBtYAAAAASUVORK5CYII="/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080b10;
      --card: #111820;
      --border: #1e2d3d;
      --accent: #00e5ff;
      --accent2: #ff3c6e;
      --text: #c9d8e8;
      --dim: #4a5a6a;
      --glow: 0 0 18px rgba(0,229,255,0.35);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
      pointer-events: none; z-index: 0;
    }
    .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
    header {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 32px; border-bottom: 1px solid var(--border);
      padding-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .logo {
      font-family: 'Orbitron', sans-serif; font-weight: 900;
      font-size: clamp(22px, 4vw, 36px); letter-spacing: 0.08em;
      color: var(--accent); text-shadow: var(--glow); line-height: 1;
    }
    .logo span { color: var(--accent2); text-shadow: 0 0 18px rgba(255,60,110,0.4); }
    .status { font-size: 11px; color: var(--dim); display: flex; align-items: center; gap: 8px; }
    .status::before {
      content: ''; display: inline-block; width: 7px; height: 7px;
      background: #00ff88; border-radius: 50%; box-shadow: 0 0 6px #00ff88;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Controls */
    .controls { display: flex; flex-direction: column; gap: 14px; margin-bottom: 28px; }
    .search-wrap { position: relative; }
    .search-wrap::before {
      content: '⌕'; position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); color: var(--dim); font-size: 18px; pointer-events: none;
    }
    #searchInput {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-family: 'Share Tech Mono', monospace;
      font-size: 13px; padding: 11px 16px 11px 40px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #searchInput::placeholder { color: var(--dim); }
    #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 12px rgba(0,229,255,0.1); }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filter-label { font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 0.2em; color: var(--dim); margin-right: 4px; }
    .filter-btn {
      background: var(--card); border: 1px solid var(--border); border-radius: 4px;
      color: var(--dim); font-family: 'Orbitron', sans-serif; font-size: 9px;
      letter-spacing: 0.12em; font-weight: 700; padding: 5px 12px; cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { border-color: transparent; }
    .filter-btn[data-tag="ALL"].active  { background: var(--accent);  color: #000; }
    .filter-btn[data-tag="GBA"].active  { background: var(--accent2); color: #fff; border-color: var(--accent2); }
    .filter-btn[data-tag="NES"].active  { background: #ffe500;        color: #000; border-color: #ffe500; }
    .filter-btn[data-tag="SNES"].active { background: #a855f7;        color: #fff; border-color: #a855f7; }
    .filter-btn[data-tag="GAME"].active { background: #00ff88;        color: #000; border-color: #00ff88; }

    .section-label {
      font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 0.25em;
      color: var(--dim); text-transform: uppercase; margin-bottom: 20px;
    }
    .section-label::before { content: '// '; color: var(--accent); }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 18px; }
    .game-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 6px;
      overflow: hidden; cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative; display: flex; flex-direction: column;
    }
    .game-card:hover {
      transform: translateY(-4px); border-color: var(--accent);
      box-shadow: 0 0 22px rgba(0,229,255,0.15), 0 8px 32px rgba(0,0,0,0.5);
    }
    .game-card:hover .card-thumb { opacity: 0.9; }
    .game-card:hover .play-overlay { opacity: 1; }
    .game-card.hidden { display: none; }
    .card-thumb {
      height: 120px; display: flex; align-items: center; justify-content: center;
      font-size: 42px; background: linear-gradient(135deg, #0a1520 0%, #0f1e2d 100%);
      opacity: 0.75; transition: opacity 0.2s; position: relative;
      font-family: 'Share Tech Mono', monospace; color: var(--accent);
      letter-spacing: -0.02em; overflow: hidden; padding: 8px;
      text-align: center; word-break: break-word;
    }
    .card-thumb .thumb-emoji { font-size: 48px; }
    .play-overlay {
      position: absolute; inset: 0; background: rgba(0,229,255,0.08);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
    }
    .play-icon {
      width: 40px; height: 40px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px rgba(0,229,255,0.6);
    }
    .play-icon::after {
      content: ''; display: inline-block; border: 0px solid transparent;
      border-left: 14px solid #000; border-top: 9px solid transparent;
      border-bottom: 9px solid transparent; margin-left: 4px;
    }
    .card-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .card-title { font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 700; color: #e8f4ff; letter-spacing: 0.04em; }
    .card-meta { font-size: 10px; color: var(--dim); display: flex; gap: 10px; align-items: center; }
    .tag { padding: 2px 7px; border-radius: 3px; font-size: 9px; font-family: 'Orbitron', sans-serif; letter-spacing: 0.1em; font-weight: 700; }
    .tag-gba  { background: rgba(255,60,110,0.15);  color: var(--accent2); border: 1px solid rgba(255,60,110,0.3); }
    .tag-nes  { background: rgba(255,229,0,0.12);   color: #ffe500;        border: 1px solid rgba(255,229,0,0.3); }
    .tag-snes { background: rgba(168,85,247,0.15);  color: #c084fc;        border: 1px solid rgba(168,85,247,0.3); }
    .tag-game { background: rgba(0,255,136,0.1);    color: #00ff88;        border: 1px solid rgba(0,255,136,0.25); }

    /* Loading / status */
    #statusMsg {
      grid-column: 1 / -1; text-align: center; padding: 48px 0;
      color: var(--dim); font-family: 'Orbitron', sans-serif;
      font-size: 11px; letter-spacing: 0.2em;
    }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--border);
      font-size: 10px; color: var(--dim); display: flex;
      justify-content: space-between; flex-wrap: wrap; gap: 8px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">GAME<span>.</span>HUB</div>
    <div class="status" id="statusDot">LOADING...</div>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search games..." oninput="filterCards()" autocomplete="off" spellcheck="false"/>
    </div>
    <div class="filter-row">
      <span class="filter-label">FILTER:</span>
      <button class="filter-btn active" data-tag="ALL"  onclick="setFilter('ALL')">ALL</button>
      <button class="filter-btn"        data-tag="GBA"  onclick="setFilter('GBA')">GBA</button>
      <button class="filter-btn"        data-tag="NES"  onclick="setFilter('NES')">NES</button>
      <button class="filter-btn"        data-tag="SNES" onclick="setFilter('SNES')">SNES</button>
      <button class="filter-btn"        data-tag="GAME" onclick="setFilter('GAME')">GAME</button>
    </div>
  </div>

  <div class="section-label">LIBRARY</div>
  <div class="grid" id="gameGrid">
    <div id="statusMsg"><span class="spinner"></span>FETCHING GAMES...</div>
  </div>

  <footer>
    <span>GAME.HUB v1.0</span>
    <span id="gameCount">// LOADING</span>
  </footer>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────────
  // The repo to pull games from. Change these if you fork or add your own repo.
  const REPOS = [
    { owner: 'bubbls', repo: 'ugs-singlefile', path: '' },       // root
    { owner: 'bubbls', repo: 'ugs-singlefile', path: 'UGS-Files' } // subfolder
  ];

  // Keyword → tag mapping. If a filename contains any of the keywords, it gets that tag.
  // Priority order: GBA first, then NES, SNES, then default GAME.
  const TAG_RULES = [
    { tag: 'GBA',  keywords: ['gba','gameboy','game boy','pokemon','zelda gba','fire emblem','advance'] },
    { tag: 'NES',  keywords: ['nes','nintendo','mario','donkey kong','metroid','nes)','(nes'] },
    { tag: 'SNES', keywords: ['snes','super nintendo','super mario','super metroid','chrono','snes)','(snes'] },
  ];

  // Emojis cycled for variety on cards
  const EMOJIS = ['🎮','👾','🕹️','⚔️','🌿','🔥','💎','🌟','🗡️','🏆','🎯','💣','🛸','🐉','🧩'];

  // ── STATE ───────────────────────────────────────────────────────────────────
  let activeFilter = 'ALL';
  let allCards = [];

  // ── INIT ────────────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', loadAllGames);

  async function loadAllGames() {
    const grid = document.getElementById('gameGrid');
    const files = [];

    for (const { owner, repo, path } of REPOS) {
      try {
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        const res = await fetch(url);
        if (!res.ok) continue;
        const items = await res.json();
        for (const item of items) {
          if (item.type === 'file' && item.name.toLowerCase().endsWith('.html')) {
            files.push({ name: item.name, rawUrl: item.download_url });
          }
        }
      } catch (e) { /* skip failed repos silently */ }
    }

    if (files.length === 0) {
      document.getElementById('statusMsg').textContent = '// NO GAMES FOUND — CHECK NETWORK OR REPO';
      return;
    }

    // Sort alphabetically
    files.sort((a, b) => cleanName(a.name).localeCompare(cleanName(b.name)));

    // Build cards
    grid.innerHTML = '';
    files.forEach((f, i) => {
      const title = cleanName(f.name);
      const tag   = detectTag(f.name);
      const emoji = EMOJIS[i % EMOJIS.length];
      const card  = buildCard(title, tag, emoji, f.rawUrl);
      grid.appendChild(card);
      allCards.push(card);
    });

    // Add "more games" placeholder
    const addCard = document.createElement('div');
    addCard.className = 'add-card';
    addCard.innerHTML = `<div style="font-size:28px;color:var(--accent)">＋</div><div style="font-size:10px;font-family:'Orbitron',sans-serif;letter-spacing:.15em;color:var(--dim)">MORE GAMES SOON</div>`;
    grid.appendChild(addCard);

    document.getElementById('statusDot').textContent = 'SYSTEM ONLINE';
    document.getElementById('gameCount').textContent = `// ${files.length} GAMES LOADED`;

    filterCards(); // apply any active filter
  }

  // ── HELPERS ─────────────────────────────────────────────────────────────────
  function cleanName(filename) {
    return filename
      .replace(/\.html$/i, '')
      .replace(/[-_]+/g, ' ')
      .replace(/\s*\(\d+\)\s*$/, '') // strip trailing "(1)" duplicates
      .trim();
  }

  function detectTag(filename) {
    const lower = filename.toLowerCase();
    for (const rule of TAG_RULES) {
      if (rule.keywords.some(kw => lower.includes(kw))) return rule.tag;
    }
    return 'GAME';
  }

  function buildCard(title, tag, emoji, rawUrl) {
    const tagClass = { GBA: 'tag-gba', NES: 'tag-nes', SNES: 'tag-snes', GAME: 'tag-game' }[tag] || 'tag-game';
    const div = document.createElement('div');
    div.className = 'game-card';
    div.dataset.title = title;
    div.dataset.tag   = tag;
    div.innerHTML = `
      <div class="card-thumb">
        <span class="thumb-emoji">${emoji}</span>
        <div class="play-overlay"><div class="play-icon"></div></div>
      </div>
      <div class="card-body">
        <div class="card-title">${escHtml(title)}</div>
        <div class="card-meta"><span class="tag ${tagClass}">${tag}</span></div>
      </div>`;
    div.addEventListener('click', () => launchGame(rawUrl));
    return div;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── FILTER ──────────────────────────────────────────────────────────────────
  function setFilter(tag) {
    activeFilter = tag;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.tag === tag));
    filterCards();
  }

  function filterCards() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    let visible = 0;
    allCards.forEach(card => {
      const title = (card.dataset.title || '').toLowerCase();
      const tag   = (card.dataset.tag  || '').toUpperCase();
      const show  = (!query || title.includes(query)) && (activeFilter === 'ALL' || tag === activeFilter);
      card.classList.toggle('hidden', !show);
      if (show) visible++;
    });
    // Show/hide no-results message
    let noRes = document.getElementById('noResults');
    if (!noRes) {
      noRes = document.createElement('div');
      noRes.id = 'noResults';
      noRes.style.cssText = 'display:none;grid-column:1/-1;text-align:center;padding:48px 0;color:var(--dim);font-family:Orbitron,sans-serif;font-size:12px;letter-spacing:.2em';
      noRes.textContent = '// NO GAMES FOUND';
      document.getElementById('gameGrid').prepend(noRes);
    }
    noRes.style.display = visible === 0 ? 'block' : 'none';
  }

  // ── LAUNCHER ────────────────────────────────────────────────────────────────
  function launchGame(rawUrl) {
    fetch(rawUrl + '?t=' + Date.now())
      .then(r => r.text())
      .then(html => {
        const win = window.open('about:blank', '_blank');
        if (!win) { alert('Pop-up blocked! Please allow pop-ups.'); return; }
        win.document.open();
        win.document.write(html);
        win.document.close();
      })
      .catch(() => alert('Could not load game. Check the URL.'));
  }
</script>
</body>
</html>
